version: "3.9"

services:
  wsi-sentinel:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATA_DIR=data
      - DATA_REFRESH_INTERVAL_S=3600
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
